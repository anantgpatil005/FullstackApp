spring.application.name=USER-SERVICE
server.port=8081

logging.level.com.netflix.discovery=DEBUG
logging.level.org.springframework.cloud.netflix.eureka=DEBUG
spring.config.import=optional:configserver:http://localhost:8086

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

resilience4j.circuitbreaker.instances.USERRATING-BREAKER.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.USERRATING-BREAKER.event-consumer-buffer-size=10
resilience4j.circuitbreaker.instances.USERRATING-BREAKER.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.USERRATING-BREAKER.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.USERRATING-BREAKER.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.USERRATING-BREAKER.wait-duration-in-open-state=6s
resilience4j.circuitbreaker.instances.USERRATING-BREAKER.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.USERRATING-BREAKER.sliding-window-size=10
resilience4j.circuitbreaker.instances.USERRATING-BREAKER.sliding-window-type=COUNT_BASED

resilience4j.retry.instances.USERRATING-BREAKER.max-attempts=3
resilience4j.retry.instances.USERRATING-BREAKER.wait-duration=5s

resilience4j.ratelimiter.instances.USERRATING-LIMITER.limit-for-period=2
resilience4j.ratelimiter.instances.USERRATING-LIMITER.limit-refresh-period=4s
resilience4j.ratelimiter.instances.USERRATING-LIMITER.timeout-duration=2s